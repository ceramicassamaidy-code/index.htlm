<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Samaidy</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #007bff, #00c6ff);
}

.container {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 420px;
  margin: 20px auto;
}

input, select {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-calcular { background: #007bff; color: white; }
.btn-wsp { background: #25D366; color: white; }

.item {
  background: #f1f3f5;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.item span {
  cursor: pointer;
}

.btn-eliminar {
  background: red;
  color: white;
  padding: 5px 10px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Cotizador Samaidy</h2>

<input id="cliente" placeholder="Cliente">
<input id="nombre" placeholder="Nombre baldosa">

<input id="largo" type="number" placeholder="Largo cm">
<input id="ancho" type="number" placeholder="Ancho cm">
<input id="m2" type="number" placeholder="M²">

<select id="material" onchange="bloquearMaterial()">
<option value="ceramica">Cerámica</option>
<option value="porcelanato">Porcelanato</option>
</select>

<input id="precioCeramica" placeholder="Precio Cerámica">
<input id="precioPorcelanato" placeholder="Precio Porcelanato">

<input id="piezasCaja" value="10">

<input id="precioPegante" placeholder="Precio pegante">

<select id="tipoBoquilla" onchange="bloquearBoquilla()">
<option value="pegamaster">Pega Master</option>
<option value="corona">Corona</option>
</select>

<input id="precioPegamaster" placeholder="Precio Pegamaster">
<input id="precioCorona" placeholder="Precio Corona">

<button class="btn-calcular" onclick="calcular()">Calcular</button>
<button class="btn-wsp" onclick="enviarWhatsApp()">WhatsApp</button>

<div id="resultado"></div>
<div id="totalSemana"></div>
<div id="historial"></div>

</div>

<script>

var firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "cotizador-samaidy.firebaseapp.com",
  projectId: "cotizador-samaidy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// BLOQUEOS
function bloquearMaterial(){
let m = material.value;
precioCeramica.disabled = m !== "ceramica";
precioPorcelanato.disabled = m !== "porcelanato";
}

function bloquearBoquilla(){
let b = tipoBoquilla.value;
precioPegamaster.disabled = b !== "pegamaster";
precioCorona.disabled = b !== "corona";
}

// CALCULAR
function calcular(){

let cliente = document.getElementById("cliente").value;
let nombre = document.getElementById("nombre").value;
let largo = parseFloat(largo.value);
let ancho = parseFloat(ancho.value);
let m2 = parseFloat(m2.value);
let piezasCaja = parseInt(document.getElementById("piezasCaja").value);

let area = (largo * ancho) / 10000;
let piezas = Math.floor(m2 / area);

let cajas = Math.floor(piezas / piezasCaja);
let sueltas = piezas - (cajas * piezasCaja);

let texto = cliente + " - " + nombre + "\n" +
cajas + " cajas + " + sueltas + " unidades";

resultado.innerText = texto;

// GUARDAR
db.collection("ventas").add({
cliente,
total: m2,
detalle: texto,
fecha: new Date()
});

cargarHistorial();
cargarSemana();
}

// WHATSAPP
function enviarWhatsApp(){
let texto = resultado.innerText;
window.open("https://wa.me/?text=" + encodeURIComponent(texto));
}

// HISTORIAL CON ELIMINAR INDIVIDUAL
function cargarHistorial(){

db.collection("ventas").orderBy("fecha","desc").get().then(snap=>{

let html = "";

snap.forEach(doc=>{

let v = doc.data();

html += `
<div class="item">
<span onclick="alert(\`${v.detalle}\`)">
${v.cliente}
</span>
<button class="btn-eliminar" onclick="eliminar('${doc.id}')">X</button>
</div>
`;

});

historial.innerHTML = html;

});
}

// ELIMINAR SOLO UNA
function eliminar(id){

if(confirm("¿Eliminar esta cotización?")){

db.collection("ventas").doc(id).delete().then(()=>{
cargarHistorial();
cargarSemana();
});

}
}

// SEMANA
function cargarSemana(){

let total = 0;
let hoy = new Date();

db.collection("ventas").get().then(snap=>{

snap.forEach(doc=>{
let f = doc.data().fecha.toDate();

if(hoy - f <= 604800000){
total += doc.data().total;
}
});

totalSemana.innerText = "💰 Semana: $" + total;

});

}

bloquearMaterial();
bloquearBoquilla();
cargarHistorial();
cargarSemana();

</script>

</body>
</html>
