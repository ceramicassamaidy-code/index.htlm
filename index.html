<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Samaidy</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #007bff, #00c6ff);
}

.container {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 420px;
  margin: 20px auto;
}

input, select {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-calcular { background: #007bff; color: white; }
.btn-wsp { background: #25D366; color: white; }

.item {
  background: #f1f3f5;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.btn-eliminar {
  background: red;
  color: white;
  border-radius: 6px;
  padding: 5px;
}

.cliente-item {
  background:#eee;
  margin-top:5px;
  padding:8px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Cotizador Samaidy</h2>

<input id="cliente" placeholder="Cliente">

<h3>👤 Clientes</h3>

<input id="nuevoCliente" placeholder="Nuevo cliente">
<button onclick="guardarCliente()">Guardar cliente</button>
<input id="buscarCliente" placeholder="Buscar cliente" oninput="cargarClientes()">

<div id="listaClientes"></div>

<input id="nombre" placeholder="Nombre baldosa">

<input id="largo" type="number" placeholder="Largo cm">
<input id="ancho" type="number" placeholder="Ancho cm">
<input id="m2" type="number" placeholder="M²">

<select id="material" onchange="bloquearMaterial()">
<option value="ceramica">Cerámica</option>
<option value="porcelanato">Porcelanato</option>
</select>

<input id="precioCeramica" placeholder="Precio Cerámica">
<input id="precioPorcelanato" placeholder="Precio Porcelanato">

<input id="piezasCaja" value="10">

<input id="precioPegante" placeholder="Precio pegante">

<select id="tipoBoquilla" onchange="bloquearBoquilla()">
<option value="pegamaster">Pega Master</option>
<option value="corona">Corona</option>
</select>

<input id="precioPegamaster" placeholder="Precio Pegamaster">
<input id="precioCorona" placeholder="Precio Corona">

<button class="btn-calcular" onclick="calcular()">Calcular</button>
<button class="btn-wsp" onclick="enviarWhatsApp()">WhatsApp</button>

<div id="resultado"></div>
<div id="totalSemana"></div>

<h3>📋 Historial</h3>
<div id="historial"></div>

</div>

<script>

// FIREBASE
var firebaseConfig = {
  apiKey: "AIzaSyAQN4JpF67HtIC0yJHwJCBgpPIFNyP3Jpk",
  authDomain: "cotizador-samaidy.firebaseapp.com",
  projectId: "cotizador-samaidy",
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// BLOQUEOS
function bloquearMaterial(){
let m = document.getElementById("material").value;
document.getElementById("precioCeramica").disabled = m !== "ceramica";
document.getElementById("precioPorcelanato").disabled = m !== "porcelanato";
}

function bloquearBoquilla(){
let b = document.getElementById("tipoBoquilla").value;
document.getElementById("precioPegamaster").disabled = b !== "pegamaster";
document.getElementById("precioCorona").disabled = b !== "corona";
}

// CALCULAR
function calcular(){

let cliente = document.getElementById("cliente").value;
let nombre = document.getElementById("nombre").value;
let largo = parseFloat(document.getElementById("largo").value);
let ancho = parseFloat(document.getElementById("ancho").value);
let m2 = parseFloat(document.getElementById("m2").value);
let piezasCaja = parseInt(document.getElementById("piezasCaja").value);

let precioCeramica = parseFloat(document.getElementById("precioCeramica").value) || 0;
let precioPorcelanato = parseFloat(document.getElementById("precioPorcelanato").value) || 0;
let precioPegante = parseFloat(document.getElementById("precioPegante").value) || 0;
let precioPegamaster = parseFloat(document.getElementById("precioPegamaster").value) || 0;
let precioCorona = parseFloat(document.getElementById("precioCorona").value) || 0;

let material = document.getElementById("material").value;
let tipoBoquilla = document.getElementById("tipoBoquilla").value;

if(!cliente || !nombre || !largo || !ancho || !m2){
alert("Completa todos los campos");
return;
}

// CALCULO SIN PASARSE
let area = (largo * ancho) / 10000;
let piezas = Math.floor(m2 / area);
let m2Real = Math.round(piezas * area * 100) / 100;

let cajas = Math.floor(piezas / piezasCaja);
let sueltas = piezas - (cajas * piezasCaja);

// MATERIALES
let pegante = Math.ceil(m2 / 3);
let boquilla = Math.ceil(m2 / 18);

// COSTOS
let precioCaja = material === "ceramica" ? precioCeramica : precioPorcelanato;
let cajasCompra = cajas + (sueltas > 0 ? 1 : 0);

let costoBaldosa = cajasCompra * precioCaja;
let costoPegante = pegante * precioPegante;

let precioBoquilla = tipoBoquilla === "pegamaster" ? precioPegamaster : precioCorona;
let costoBoquilla = boquilla * precioBoquilla;

let total = costoBaldosa + costoPegante + costoBoquilla;

// FECHA
let fecha = new Date().toLocaleDateString();

// TEXTO FINAL
let texto = `*COTIZACIÓN DE CERÁMICA*

*Cliente:* ${cliente}
*Fecha:* ${fecha}

*BALDOSA:* ${nombre} (${largo}x${ancho} cm)
*Área solicitada:* ${m2.toFixed(2)} m²
*Área entregada:* ${m2Real.toFixed(2)} m²

*ENTREGA AL CLIENTE:*
${cajas} cajas + ${sueltas} unidades (${piezas} pzas)

*MATERIALES:*
• Pegante: ${pegante} bultos
• Boquilla ${tipoBoquilla === "pegamaster" ? "Pega Master" : "Corona"}: ${boquilla} bultos

*COSTOS:*
• Baldosa: $ ${costoBaldosa.toLocaleString()}
• Pegante: $ ${costoPegante.toLocaleString()}
• Boquilla: $ ${costoBoquilla.toLocaleString()}

*TOTAL: $ ${total.toLocaleString()}*`;

document.getElementById("resultado").innerText = texto;

// GUARDAR
db.collection("ventas").add({
cliente,
total: total,
detalle: texto,
fecha: new Date()
});

cargarHistorial();
cargarSemana();
}

// WHATSAPP
function enviarWhatsApp(){
let texto = document.getElementById("resultado").innerText;
if(!texto){ alert("Primero calcula"); return; }
window.open("https://wa.me/?text=" + encodeURIComponent(texto));
}

// HISTORIAL
function cargarHistorial(){
db.collection("ventas").orderBy("fecha","desc").get().then(snap=>{
let html="";
snap.forEach(doc=>{
let v = doc.data();
html += `
<div class="item">
<span onclick="alert(\`${v.detalle}\`)">${v.cliente}</span>
<button class="btn-eliminar" onclick="eliminar('${doc.id}')">X</button>
</div>`;
});
document.getElementById("historial").innerHTML = html;
});
}

// ELIMINAR
function eliminar(id){
if(confirm("¿Eliminar cotización?")){
db.collection("ventas").doc(id).delete().then(()=>{
cargarHistorial();
cargarSemana();
});
}
}

// SEMANA
function cargarSemana(){
let total=0;
let hoy=new Date();

db.collection("ventas").get().then(snap=>{
snap.forEach(doc=>{
let f=doc.data().fecha.toDate();
if(hoy-f<=604800000){
total+=doc.data().total;
}
});
document.getElementById("totalSemana").innerText =
"💰 Semana: $" + Math.round(total).toLocaleString();
});
}

// CLIENTES
function guardarCliente(){
let nombre = document.getElementById("nuevoCliente").value;
if(!nombre){alert("Escribe nombre");return;}
db.collection("clientes").add({nombre});
document.getElementById("nuevoCliente").value="";
cargarClientes();
}

function cargarClientes(){
let filtro = document.getElementById("buscarCliente").value.toLowerCase();

db.collection("clientes").get().then(snap=>{
let html="";
snap.forEach(doc=>{
let c=doc.data();
if(c.nombre.toLowerCase().includes(filtro)){
html+=`
<div class="cliente-item">
<span onclick="seleccionarCliente('${c.nombre}')">${c.nombre}</span>
<button class="btn-eliminar" onclick="eliminarCliente('${doc.id}')">X</button>
</div>`;
}
});
document.getElementById("listaClientes").innerHTML=html;
});
}

function seleccionarCliente(nombre){
document.getElementById("cliente").value = nombre;
}

function eliminarCliente(id){
if(confirm("¿Eliminar cliente?")){
db.collection("clientes").doc(id).delete().then(()=>{
cargarClientes();
});
}
}

// INIT
bloquearMaterial();
bloquearBoquilla();
cargarHistorial();
cargarSemana();
cargarClientes();

</script>

</body>
</html>
