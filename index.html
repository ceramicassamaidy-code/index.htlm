<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Samaidy</title>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: #e0e0e0;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 420px;
  margin: auto;
}

input, select, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}

button {
  background: #007bff;
  color: white;
}

.resultado {
  margin-top: 10px;
  white-space: pre-line;
}

.totalSemana {
  margin-top: 10px;
  font-weight: bold;
  color: green;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Cotizador Samaidy</h2>

<input id="cliente" placeholder="Cliente">
<input id="nombre" placeholder="Nombre baldosa">

<input id="largo" type="number" placeholder="Largo cm">
<input id="ancho" type="number" placeholder="Ancho cm">
<input id="m2" type="number" placeholder="M² requeridos">

<select id="material">
  <option value="ceramica">Cerámica</option>
  <option value="porcelanato">Porcelanato</option>
</select>

<input id="precioCeramica" type="number" placeholder="Precio m² Cerámica">
<input id="precioPorcelanato" type="number" placeholder="Precio m² Porcelanato">

<input id="piezasCaja" type="number" value="10" placeholder="Piezas por caja">

<input id="precioPegante" type="number" placeholder="Precio pegante">

<select id="tipoBoquilla">
  <option value="pegamaster">Pega Master</option>
  <option value="corona">Corona</option>
</select>

<input id="precioPegamaster" type="number" placeholder="Precio Pegamaster">
<input id="precioCorona" type="number" placeholder="Precio Corona">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>
<div class="totalSemana" id="totalSemana"></div>

</div>

<script>

// 🔥 FIREBASE CONFIG (TUYA)
var firebaseConfig = {
  apiKey: "AIzaSyAQN4JpF67HtIC0yJHwJCBgpPIFNyP3Jpk",
  authDomain: "cotizador-samaidy.firebaseapp.com",
  projectId: "cotizador-samaidy",
  storageBucket: "cotizador-samaidy.firebasestorage.app",
  messagingSenderId: "126219534736",
  appId: "1:126219534736:web:24cd6f0f255972f2763315"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// 🔥 CALCULAR
function calcular(){

let cliente = document.getElementById("cliente").value;
let nombre = document.getElementById("nombre").value;
let largo = parseFloat(document.getElementById("largo").value);
let ancho = parseFloat(document.getElementById("ancho").value);
let m2 = parseFloat(document.getElementById("m2").value);
let piezasCaja = parseInt(document.getElementById("piezasCaja").value);

let material = document.getElementById("material").value;

let precioM2 = material === "ceramica"
  ? parseFloat(document.getElementById("precioCeramica").value)
  : parseFloat(document.getElementById("precioPorcelanato").value);

let precioPegante = parseFloat(document.getElementById("precioPegante").value);

let tipoBoquilla = document.getElementById("tipoBoquilla").value;

let precioBoquilla = tipoBoquilla === "pegamaster"
  ? parseFloat(document.getElementById("precioPegamaster").value)
  : parseFloat(document.getElementById("precioCorona").value);

// área
let area = (largo * ancho) / 10000;

// piezas sin pasarse
let totalPiezas = Math.floor(m2 / area);

// corrección decimal exacta
let m2Real = Math.round((totalPiezas * area) * 100) / 100;

// cajas y unidades
let cajas = Math.floor(totalPiezas / piezasCaja);
let sueltas = totalPiezas - (cajas * piezasCaja);

// materiales
let pegante = Math.ceil(m2 / 3);
let boquilla = Math.ceil(m2 / 18);

// costos
let totalMaterial = m2Real * precioM2;
let totalPegante = pegante * precioPegante;
let totalBoquilla = boquilla * precioBoquilla;
let total = totalMaterial + totalPegante + totalBoquilla;

let fecha = new Date().toLocaleDateString();

// resultado completo
let texto = `*COTIZACIÓN DE CERÁMICA*

*Cliente:* ${cliente}
*Fecha:* ${fecha}

*BALDOSA:* ${nombre} (${largo}x${ancho} cm)
*Área solicitada:* ${m2.toFixed(2)} m²
*Área entregada:* ${m2Real.toFixed(2)} m²

*ENTREGA AL CLIENTE:*
   ${cajas} cajas completas + ${sueltas} unidades (${totalPiezas} pzas)

*Cajas a comprar:*
   ${cajas} cajas completas + ${sueltas} unidades

*MATERIALES:*
• Pegante: ${pegante} bultos
• Boquilla ${tipoBoquilla === "pegamaster" ? "Pega Master" : "Corona"}: ${boquilla} bultos

*COSTOS:*
• Baldosa: $ ${Math.round(totalMaterial).toLocaleString()}
• Pegante: $ ${totalPegante.toLocaleString()}
• Boquilla: $ ${totalBoquilla.toLocaleString()}

*TOTAL: $ ${Math.round(total).toLocaleString()}*`;

document.getElementById("resultado").innerText = texto;

// 🔥 GUARDAR EN FIREBASE
db.collection("ventas").add({
  cliente,
  total,
  fecha: new Date()
});

cargarSemana();
}

// 🔥 TOTAL SEMANAL
function cargarSemana(){

let totalSemana = 0;
let hoy = new Date();

db.collection("ventas").get().then(snapshot => {

  snapshot.forEach(doc => {

    let v = doc.data();
    let fecha = v.fecha.toDate();

    if(hoy - fecha <= 7 * 24 * 60 * 60 * 1000){
      totalSemana += v.total;
    }
  });

  document.getElementById("totalSemana").innerText =
  "💰 Total semanal: $" + Math.round(totalSemana).toLocaleString();
});
}

cargarSemana();

</script>

</body>
</html>
