<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Samaidy</title>

<!-- 🔥 FIREBASE (VERSIÓN SIMPLE QUE SÍ FUNCIONA) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #e0e0e0;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 420px;
  margin: auto;
}

input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}

button {
  background: #007bff;
  color: white;
}

.resultado {
  margin-top: 10px;
}

.totalSemana {
  margin-top: 10px;
  font-weight: bold;
  color: green;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Cotizador Samaidy</h2>

<input id="cliente" placeholder="Cliente">
<input id="largo" type="number" placeholder="Largo cm">
<input id="ancho" type="number" placeholder="Ancho cm">
<input id="m2" type="number" placeholder="M² requeridos">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>
<div class="totalSemana" id="totalSemana"></div>

</div>

<script>

// 🔥 TU FIREBASE YA INTEGRADO
var firebaseConfig = {
  apiKey: "AIzaSyAQN4JpF67HtIC0yJHwJCBgpPIFNyP3Jpk",
  authDomain: "cotizador-samaidy.firebaseapp.com",
  projectId: "cotizador-samaidy",
  storageBucket: "cotizador-samaidy.firebasestorage.app",
  messagingSenderId: "126219534736",
  appId: "1:126219534736:web:24cd6f0f255972f2763315"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// 🔥 CALCULAR
function calcular(){

let cliente = document.getElementById("cliente").value;
let largo = parseFloat(document.getElementById("largo").value);
let ancho = parseFloat(document.getElementById("ancho").value);
let m2 = parseFloat(document.getElementById("m2").value);

// área
let area = (largo * ancho) / 10000;

// no pasarse
let piezas = Math.floor(m2 / area);

// corrección decimal
let m2Real = Math.round((piezas * area) * 100) / 100;

// ejemplo precio (puedes cambiarlo luego)
let total = m2Real * 10000;

// mostrar
document.getElementById("resultado").innerText =
`${cliente} → ${m2Real} m² → $${Math.round(total).toLocaleString()}`;

// 🔥 GUARDAR EN NUBE
db.collection("ventas").add({
  cliente: cliente,
  total: total,
  fecha: new Date()
});

cargarSemana();
}

// 🔥 TOTAL SEMANAL
function cargarSemana(){

let totalSemana = 0;
let hoy = new Date();

db.collection("ventas").get().then(snapshot => {

  snapshot.forEach(doc => {

    let v = doc.data();
    let fecha = v.fecha.toDate();

    if(hoy - fecha <= 7 * 24 * 60 * 60 * 1000){
      totalSemana += v.total;
    }
  });

  document.getElementById("totalSemana").innerText =
  "💰 Total semanal: $" + Math.round(totalSemana).toLocaleString();
});
}

// cargar al inicio
cargarSemana();

</script>

</body>
</html>
